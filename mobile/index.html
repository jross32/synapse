<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="color-scheme" content="dark" />
  <meta name="theme-color" content="#0b1020" />
  <title>Synapse Mobile</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #0b1020;
      --card: #12192d;
      --border: #24304d;
      --text: #e8edf8;
      --muted: #9aa8c6;
      --accent: #7c5cff;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      background:
        radial-gradient(circle at top, rgba(124, 92, 255, 0.22), transparent 34%),
        linear-gradient(180deg, #0b1020, #0a0f1b);
      color: var(--text);
      font: 16px/1.5 system-ui, -apple-system, Segoe UI, sans-serif;
    }
    .card {
      width: min(100%, 560px);
      border: 1px solid var(--border);
      border-radius: 28px;
      padding: 28px;
      background: rgba(18, 25, 45, 0.96);
      box-shadow: 0 24px 80px rgba(0, 0, 0, 0.35);
      backdrop-filter: blur(18px);
    }
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 6px 12px;
      border-radius: 999px;
      background: rgba(124, 92, 255, 0.14);
      color: #cbbcff;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.18em;
      text-transform: uppercase;
    }
    h1 {
      margin: 16px 0 8px;
      font-size: 30px;
      line-height: 1.1;
    }
    p {
      margin: 0;
      color: var(--muted);
    }
    code {
      color: var(--text);
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
    }
    .panel {
      margin-top: 22px;
      padding: 16px 18px;
      border-radius: 18px;
      border: 1px solid var(--border);
      background: rgba(8, 12, 22, 0.55);
    }
  </style>
</head>
<body>
  <main class="card">
    <div class="badge">Synapse Mobile</div>
    <h1>The full mobile shell is not built yet.</h1>
    <p>
      Synapse now uses the same React shell for desktop and phone. This fallback page only appears
      when the bundled renderer build is missing.
    </p>
    <div class="panel">
      <p>
        Build the renderer so <code>/mobile</code> serves the real phone UI, then reload this page.
      </p>
    </div>
  </main>
</body>
</html>
